# SonarQube Server (self-hosted) analysis via GitHub Actions.
#
# Setup:
# 1. Create the project in SonarQube with the same key as sonar.projectKey in sonar-project.properties.
# 2. Repository secrets: SONAR_TOKEN, SONAR_HOST_URL (e.g. https://sonarqube.example.com).
#
# SonarCloud: use the SonarCloud GitHub app / sonarcloud action instead; add sonar.organization to sonar-project.properties.
# Docs: https://docs.sonarsource.com/sonarqube-server/latest/devops-platform-integration/github-integration/integrating-with-github-actions/

name: SonarQube

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  sonarqube:
    name: Analyze
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v4
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
