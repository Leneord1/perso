# SonarQube / SonarScanner configuration (used by GitHub Actions: .github/workflows/sonarqube.yml)
#
# Self-hosted SonarQube Server: add repository secrets SONAR_TOKEN and SONAR_HOST_URL, then create
# a project in SonarQube whose Project key matches sonar.projectKey below (or change this value to match).
#
# SonarCloud instead: add sonar.organization=YOUR_ORG_KEY, set sonar.host.url=https://sonarcloud.io,
# use the SonarCloud GitHub Action, and use a SonarCloud token — see https://docs.sonarsource.com/sonarqube-cloud/

sonar.projectKey=leneord1
sonar.projectName=Personal website

sonar.sources=src
sonar.sourceEncoding=UTF-8

# Nested CRA scaffold and build output should not be analyzed
sonar.exclusions=**/node_modules/**,**/dist/**,**/chatbot/**,**/coverage/**,**/.vite/**,**/*.test.js,**/*.test.jsx,**/setupTests.js

# Optional: when you add Vitest coverage (lcov), uncomment:
# sonar.javascript.lcov.reportPaths=coverage/lcov.info
